<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        /* 【絶対死守】ボタンの黄金律：一切変更なし */
        :root {
            --metal-base: #4a4a4a;
            --metal-highlight: #999;
            --metal-shadow: #111;
            --accent-cyan: #00ffff;
        }

        body { 
            background-color: #1a1a1a; 
            margin: 0; 
            padding: 20px;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
        }

        .terminal-interface {
            display: flex;
            flex-direction: column;
            width: 1024px;
            height: 700px;
            background: #2a2a2a;
            border: 1px solid #000;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            position: relative;
        }

        /* ヘッダー */
        .header-bar {
            height: 45px;
            background: linear-gradient(180deg, #555, #333);
            border-bottom: 2px solid #111;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            box-shadow: inset 1px 1px 0 #888;
        }

        /* 下部フッター */
        .footer-bar {
            height: 45px;
            background: linear-gradient(180deg, #555, #333);
            border-top: 2px solid #111;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            box-shadow: inset 1px 1px 0 #888;
        }

        .header-title {
            color: #eee;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .header-sub {
            color: var(--accent-cyan);
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .content-body {
            display: flex;
            flex-grow: 1;
            background: #222;
            padding: 0;
            position: relative;
            background-image: repeating-linear-gradient(0deg, #111 0px, #111 1px, transparent 1px, transparent 3px);
        }

        .sidebar-unit {
            width: 200px;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 背後の構造パネル（幅50px） */
        .structural-panel {
            position: absolute;
            left: 0;
            top: 0;
            width: 50px;
            height: 100%;
            background: #3a3a3a;
            border-right: 1px solid #111;
            box-shadow: 
                2px 0px 0px #555 inset, 
                5px 0px 15px rgba(0,0,0,0.7);
            z-index: 1;
        }

        /* 【修正】ボタンの位置：50pxのパネルに対して「重なり」が出る位置（25px）に調整 */
        .button-area {
            position: relative;
            z-index: 2;
            padding: 30px 10px 30px 25px; /* 左余白を25pxにし、パネルの半分程度に重なるように配置 */
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 【ボタン：黄金律を完全維持】 */
        .mech-button {
            position: relative;
            width: 160px;
            height: 30px;
            background: linear-gradient(180deg, #666 0%, #444 100%);
            border: 1px solid #111;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 1px 1px 0px #888 inset;
            transition: all 0.1s;
            text-decoration: none;
        }

        .mech-button::before {
            content: "";
            position: absolute;
            top: 3px; left: 3px; right: 3px; bottom: 3px;
            background: #2a2a2a;
            border: 1px solid #111;
            box-shadow: inset 1px 1px 3px #000;
        }

        .mech-button span {
            position: relative;
            color: #aaa;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .mech-button:hover::before { background: #333; }
        .mech-button:hover span {
            color: var(--accent-cyan);
            text-shadow: 0 0 8px var(--accent-cyan);
        }

        .monitor-frame {
            flex-grow: 1;
            margin: 15px;
            background: #000;
            border: 8px solid #3a3a3a;
            outline: 2px solid #111;
            position: relative;
            box-shadow: inset 0 0 40px #000;
        }

        .monitor-screen::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0, 255, 255, 0.05) 1px, rgba(0, 255, 255, 0.05) 2px);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="terminal-interface">
    <header class="header-bar">
        <div class="header-title">SPACE ROBOTMAN WORLD</div>
        <div class="header-sub">MAIN DATA TERMINAL // v.3.0</div>
    </header>

    <div class="content-body">
        <div class="sidebar-unit">
            <div class="structural-panel"></div>
            
            <div class="button-area">
                <div class="nav-group">
                    <a class="mech-button"><span>Home / Status</span></a>
                    <a class="mech-button"><span>CG-Artworks</span></a>
                    <a class="mech-button"><span>Unit-Archives</span></a>
                    <a class="mech-button"><span>Motion-Data</span></a>
                    <a class="mech-button"><span>Overview</span></a>
                </div>

                <div class="nav-group">
                    <a class="mech-button"><span>Admin Login</span></a>
                    <a class="mech-button"><span>Opening Top</span></a>
                </div>
            </div>
        </div>

        <main class="monitor-frame">
            <div class="monitor-screen"></div>
        </main>
    </div>

    <footer class="footer-bar">
        <div style="color: #555; font-size: 8px; font-family: monospace;">
            (C) 2003-2026 GRAPHIC-SPACE
        </div>
    </footer>
</div>

</body>
</html>
